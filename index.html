<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Old Carolina Tractor Rentals</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:40px;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.section{
background:white;
padding:20px;
margin-top:20px;
border-radius:8px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
border:1px solid #ddd;
padding:15px;
text-align:center;
border-radius:6px;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

.cart{
background:#fff3cd;
padding:15px;
margin-top:20px;
border-radius:6px;
}

</style>

</head>

<body>

<header>

<h1>Old Carolina Tractor Rentals</h1>

<p>Reliable Tractor Rental for Property Work, Land Clearing, and Landscaping</p>

</header>

<div class="container">


<div class="section">

<h2>Tractor Rental</h2>

<label>Days:</label>
<input id="days" type="number" value="1">

<div class="grid">

<div class="card">

<h3>Weekday Tractor</h3>
<p>$175 / Day</p>

<button onclick="addItem('Weekday Tractor',175)">Add</button>

</div>

<div class="card">

<h3>Weekend Tractor</h3>
<p>$200 / Day</p>

<button onclick="addItem('Weekend Tractor',200)">Add</button>

</div>

</div>

</div>


<div class="section">

<h2>Attachments</h2>

<div class="grid">

<div class="card">
Grapple $50
<button onclick="addItem('Grapple',50)">Add</button>
</div>

<div class="card">
Box Blade $25
<button onclick="addItem('Box Blade',25)">Add</button>
</div>

<div class="card">
Rotary Cutter $50
<button onclick="addItem('Rotary Cutter',50)">Add</button>
</div>

<div class="card">
Stump Grinder $100
<button onclick="addItem('Stump Grinder',100)">Add</button>
</div>

<div class="card">
Landscape Rake $20
<button onclick="addItem('Landscape Rake',20)">Add</button>
</div>

<div class="card">
Backhoe $75
<button onclick="addItem('Backhoe',75)">Add</button>
</div>

</div>

</div>


<div class="section cart">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3 id="total"></h3>

<button onclick="sendOrder()">Send Rental Request</button>

</div>


</div>


<script>

let cart=[];

function addItem(name,price){

let days=document.getElementById("days").value;

let subtotal=price*days;

cart.push({name,price,days,subtotal});

updateCart();

}

function updateCart(){

let html="";

let total=0;

cart.forEach(item=>{

html+=item.name+" - "+item.days+" days = $"+item.subtotal+"<br>";

total+=item.subtotal;

});

document.getElementById("cartItems").innerHTML=html;

document.getElementById("total").innerHTML="Subtotal: $"+total;

}

function sendOrder(){

let order="Rental Request:%0D%0A";

cart.forEach(item=>{

order+=item.name+" - "+item.days+" days = $"+item.subtotal+"%0D%0A";

});

window.location.href="mailto:oldcarolinars@gmail.com?subject=Rental Request&body="+order;

}

</script>

</body>

</html>
